<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>import - うごく単語帳</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--acc:#3b82f6;--bg:#0a0a0a;--frm:#171717;--crd:#262626;--tm:#fff;--ts:#a3a3a3;--bdr:#333;}
body{background:var(--bg);color:var(--tm);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* screens */
.screen{width:100%;display:flex;flex-direction:column;align-items:center;}

/* ── HOME SCREEN ── */
#home{padding:28px 16px 40px;max-width:420px;margin:0 auto;}
.home-header{text-align:center;margin-bottom:28px;}
.home-title{font-size:1.8rem;font-weight:800;letter-spacing:2px;color:var(--tm);}
.home-sub{font-size:.85rem;color:var(--ts);margin-top:4px;}
.deck-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.deck-card{background:var(--frm);border:1px solid var(--bdr);border-radius:16px;padding:16px 14px;cursor:pointer;transition:border-color .15s,transform .1s;user-select:none;}
.deck-card:active{transform:scale(.97);border-color:var(--acc);}
.deck-emoji{font-size:1.6rem;margin-bottom:8px;}
.deck-name{font-size:.88rem;font-weight:600;color:var(--tm);line-height:1.3;margin-bottom:4px;}
.deck-count{font-size:.75rem;color:var(--ts);}
.deck-card.featured{grid-column:1/-1;background:linear-gradient(135deg,#1e3a5f,#172554);border-color:#2563eb;}

/* ── PHONE FRAME ── */
.phone{width:360px;max-width:100vw;height:680px;max-height:100dvh;background:var(--frm);border-radius:36px;border:6px solid #3a3a3a;box-shadow:0 0 0 1px #222,0 24px 60px rgba(0,0,0,.7);display:flex;flex-direction:column;overflow:hidden;position:relative;}
@media(max-width:400px){.phone{border-radius:0;border:none;box-shadow:none;width:100vw;height:100dvh;}}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:110px;height:24px;background:#3a3a3a;border-bottom-left-radius:14px;border-bottom-right-radius:14px;z-index:20;}
.top-bar{position:absolute;top:28px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 14px;z-index:15;}
.btn-back{background:none;border:none;color:var(--ts);font-size:1.1rem;cursor:pointer;padding:6px;font-family:inherit;}
.btn-settings{background:none;border:none;color:var(--ts);font-size:1.1rem;cursor:pointer;padding:6px;font-family:inherit;}
.deck-label{font-size:.7rem;color:var(--ts);letter-spacing:.5px;}

/* anim area */
.aa{width:100%;height:196px;background:#000;position:relative;overflow:hidden;flex-shrink:0;margin-top:0;}
.ac{width:100%;height:100%;position:relative;}
.ball{width:28px;height:28px;background:var(--acc);border-radius:50%;position:absolute;z-index:2;}
.box{background:#555;position:absolute;z-index:1;}
.tri,.ring,.dia,.arr,.star,.b2,.b3{display:none;position:absolute;z-index:2;}
.tri{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-bottom:26px solid var(--acc);}
.ring{width:30px;height:30px;border:4px solid var(--acc);border-radius:50%;background:transparent;box-sizing:border-box;}
.dia{width:22px;height:22px;background:var(--acc);}
.arr{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:22px solid var(--acc);}
.star{width:26px;height:26px;background:#fbbf24;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);}
.b2{width:26px;height:26px;background:#22c55e;border-radius:50%;}
.b3{width:26px;height:26px;background:#ef4444;border-radius:50%;}
.pb{height:3px;background:rgba(255,255,255,.15);position:absolute;bottom:0;left:0;right:0;}
.pf{height:100%;background:var(--acc);width:0%;}
.btn-auto{position:absolute;top:10px;right:10px;background:rgba(59,130,246,.85);color:#fff;border:none;border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;z-index:10;font-family:inherit;}
.btn-stop{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.12);color:var(--ts);border:none;border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;z-index:10;display:none;font-family:inherit;}

/* content */
.cnt{flex:1;padding:14px 20px 4px;display:flex;flex-direction:column;background:var(--bg);min-height:0;}
.cn{font-size:11px;color:var(--ts);text-align:right;margin-bottom:3px;}
.ct{font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:2px;}
.wd{font-size:1.9rem;font-weight:700;text-align:center;color:var(--tm);margin-bottom:4px;}
.mn{font-size:.9rem;font-weight:500;color:var(--acc);text-align:center;min-height:1.3em;margin-bottom:8px;transition:opacity .25s;}
.mn.hid{opacity:0;}
.ex{background:var(--crd);border-radius:12px;padding:11px 14px;font-size:.82rem;line-height:1.7;flex:1;opacity:0;transition:opacity .25s;overflow:hidden;}
.ex.vis{opacity:1;}
.een{color:var(--tm);font-weight:500;}
.eja{color:var(--ts);margin-top:5px;padding-left:1em;}

/* controls */
.ctrl{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 24px;background:var(--frm);flex-shrink:0;}
.bn{width:44px;height:44px;border-radius:50%;background:#333;border:none;color:var(--tm);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.bn:active{background:#444;}
.bm{background:var(--acc);color:#fff;border:none;border-radius:22px;padding:11px 20px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;}
.bm:active{opacity:.85;}

/* ── SETTINGS PANEL ── */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.settings-overlay.open{display:flex;}
.settings-panel{background:#1c1c1e;border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:20px 20px 40px;}
.settings-handle{width:40px;height:4px;background:#444;border-radius:2px;margin:0 auto 20px;}
.settings-title{font-size:.85rem;font-weight:600;color:var(--ts);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.settings-row{margin-bottom:20px;}
.settings-label{font-size:.8rem;color:var(--ts);margin-bottom:8px;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;}
.btn-opt{background:#2c2c2e;color:var(--ts);border:1px solid #3a3a3a;border-radius:20px;padding:7px 16px;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-opt.active{background:var(--acc);color:#fff;border-color:var(--acc);}
.btn-opt:active{transform:scale(.96);}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen">
  <div class="home-header">
    <div class="home-title">import</div>
    <div class="home-sub">うごく単語帳 — デッキを選んでスタート</div>
  </div>
  <div class="deck-grid" id="deckGrid"></div>
</div>

<!-- STUDY SCREEN -->
<div id="study" class="screen" style="display:none">
  <div class="phone">
    <div class="notch"></div>
    <div class="top-bar">
      <button class="btn-back" onclick="goHome()">← 戻る</button>
      <span class="deck-label" id="deckLabel"></span>
      <button class="btn-settings" onclick="openSettings()">⚙</button>
    </div>
    <div class="aa" style="margin-top:50px;height:148px;">
      <div id="ac" class="ac anim-jump-over">
        <div class="box"></div><div class="ball"></div>
        <div class="tri"></div><div class="ring"></div>
        <div class="dia"></div><div class="arr"></div>
        <div class="star"></div><div class="b2"></div><div class="b3"></div>
      </div>
      <button class="btn-auto" id="btnAuto" onclick="startAuto()">▶ 自動再生</button>
      <button class="btn-stop" id="btnStop" onclick="stopAuto()">■ 停止</button>
      <div class="pb"><div class="pf" id="pf"></div></div>
    </div>
    <div class="cnt">
      <div class="cn" id="cn">1 / 50</div>
      <div class="ct" id="ct">Phrasal Verb</div>
      <div class="wd" id="wd">jump over</div>
      <div class="mn hid" id="mn">〜を飛び越える</div>
      <div class="ex" id="ex">
        <div class="een" id="een">Can you jump over that puddle?</div>
        <div class="eja" id="eja">→ あの水たまり、飛び越えられる？</div>
      </div>
    </div>
    <div class="ctrl">
      <button class="bn" onclick="prev()">‹</button>
      <button class="bm" id="bt" onclick="toggle()">意味・例文を表示</button>
      <button class="bn" onclick="next()">›</button>
    </div>
  </div>
</div>

<!-- SETTINGS OVERLAY -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <div class="settings-handle"></div>
    <div class="settings-title">設定</div>

    <div class="settings-row">
      <div class="settings-label">再生速度</div>
      <div class="btn-group" id="speedBtns">
        <button class="btn-opt" onclick="setSpeed(0.5)">0.5</button>
        <button class="btn-opt" onclick="setSpeed(0.75)">0.75</button>
        <button class="btn-opt active" onclick="setSpeed(1.0)">1.0</button>
        <button class="btn-opt" onclick="setSpeed(1.2)">1.2</button>
        <button class="btn-opt" onclick="setSpeed(1.5)">1.5</button>
      </div>
    </div>

    <div class="settings-row">
      <div class="settings-label">読み上げ回数（自動再生）</div>
      <div class="btn-group" id="readBtns">
        <button class="btn-opt" onclick="setReadCount(1)">1回</button>
        <button class="btn-opt active" onclick="setReadCount(2)">2回</button>
      </div>
    </div>

    <div class="settings-row">
      <div class="settings-label">声の種類</div>
      <div class="btn-group" id="voiceBtns">
        <button class="btn-opt active" onclick="setGender('auto')">オート</button>
        <button class="btn-opt" onclick="setGender('female')">女性</button>
        <button class="btn-opt" onclick="setGender('male')">男性</button>
      </div>
    </div>

    <div class="settings-row">
      <div class="settings-label">音声を選ぶ</div>
      <select id="voiceSelect" onchange="selectVoice(this.value)" style="width:100%;background:#2c2c2e;color:var(--tm);border:1px solid #3a3a3a;border-radius:10px;padding:8px 12px;font-size:.82rem;font-family:inherit;">
        <option value="">デフォルト</option>
      </select>
    </div>

    <button class="bm" onclick="closeSettings()" style="width:100%;margin-top:4px;">閉じる</button>
  </div>
</div>

<style>
/* ── ANIMATIONS (all 58 types) ── */
.anim-jump-over .ball,.anim-get-over .ball,.anim-overcome .ball{animation:jover 2s cubic-bezier(.25,.46,.45,.94) infinite;}
.anim-jump-over .box,.anim-get-over .box,.anim-overcome .box{width:64px;height:18px;bottom:28px;left:50%;transform:translateX(-50%);}
@keyframes jover{0%{left:8%;bottom:28px}50%{left:50%;bottom:108px}100%{left:88%;bottom:28px}}
.anim-walk-around .ball,.anim-travel-around .ball{animation:waround 4s ease-in-out infinite;}
.anim-walk-around .box,.anim-travel-around .box{width:120px;height:14px;bottom:28px;left:50%;transform:translateX(-50%);}
@keyframes waround{0%{left:18%;transform:scale(1)}25%{left:78%;transform:scale(1)}50%{left:78%;transform:scale(.6)}75%{left:18%;transform:scale(.6)}100%{left:18%;transform:scale(1)}}
.anim-look-up .ball{left:38%;bottom:28px;animation:lup 2s ease-in-out infinite;}
.anim-look-up .box{width:18px;height:108px;bottom:28px;left:68%;}
@keyframes lup{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.3) translateY(-8px)}}
.anim-run-away .ball{animation:raway 1.8s linear infinite;bottom:28px;}
.anim-run-away .box{width:36px;height:36px;background:#8b0000;border-radius:4px;bottom:28px;left:78%;}
@keyframes raway{0%{left:58%}100%{left:-14%}}
.anim-arrive-at .ball,.anim-get-to .ball,.anim-reach .ball,.anim-come-to .ball{animation:arrat 2.2s ease-out infinite;bottom:28px;}
.anim-arrive-at .box,.anim-get-to .box,.anim-reach .box,.anim-come-to .box{width:8px;height:56px;bottom:28px;left:72%;}
@keyframes arrat{0%{left:-8%}60%,100%{left:60%}}
.anim-in .ball,.anim-put-in .ball,.anim-drop-in .ball,.anim-go-in .ball{left:50%;transform:translateX(-50%);animation:inA 2s ease-in-out infinite;}
.anim-in .box,.anim-put-in .box,.anim-drop-in .box,.anim-go-in .box{width:58px;height:36px;background:transparent;border:5px solid #555;border-top:none;border-radius:0 0 10px 10px;bottom:28px;left:50%;transform:translateX(-50%);}
@keyframes inA{0%{bottom:110px}55%,100%{bottom:32px}}
.anim-on .ball,.anim-put-on .ball,.anim-get-on .ball{left:50%;transform:translateX(-50%);animation:onA 2s ease-in-out infinite;}
.anim-on .box,.anim-put-on .box,.anim-get-on .box{width:100px;height:9px;bottom:28px;left:50%;transform:translateX(-50%);}
@keyframes onA{0%{bottom:108px}55%,100%{bottom:38px}}
.anim-at .ball{animation:atA 2s ease-out infinite;bottom:28px;}
.anim-at .box{width:12px;height:12px;border-radius:50%;background:#ff4444;bottom:28px;left:68%;}
@keyframes atA{0%{left:8%}55%,100%{left:53%}}
.anim-through .ball,.anim-go-through .ball,.anim-pass-through .ball,.anim-get-through .ball{animation:thru 2.5s linear infinite;bottom:28px;}
.anim-through .box,.anim-go-through .box,.anim-pass-through .box,.anim-get-through .box{width:38px;height:56px;background:transparent;border-top:8px solid #555;border-bottom:8px solid #555;bottom:14px;left:50%;transform:translateX(-50%);}
@keyframes thru{0%{left:-8%}100%{left:108%}}
.anim-between .ball,.anim-stand-between .ball{animation:btwn 2.5s ease-in-out infinite;bottom:28px;}
.anim-between .box,.anim-stand-between .box{width:18px;height:56px;bottom:28px;left:20%;box-shadow:130px 0 0 #555;}
@keyframes btwn{0%{left:-8%}45%,100%{left:40%}}
.anim-fall-down .ball{animation:fdown 2.5s ease-in infinite;}
.anim-fall-down .box{width:112px;height:90px;clip-path:polygon(0 100%,100% 100%,0 0);bottom:28px;left:8%;border-radius:0;}
@keyframes fdown{0%{left:4%;bottom:118px;transform:rotate(0)}42%{left:54%;bottom:28px;transform:rotate(360deg)}100%{left:116%;bottom:28px;transform:rotate(720deg)}}
.anim-hit .ball,.anim-strike .ball,.anim-crash-into .ball{animation:hitB 2s infinite;bottom:28px;}
.anim-hit .box,.anim-strike .box,.anim-crash-into .box{width:18px;height:72px;bottom:28px;left:70%;animation:hitW 2s infinite;border-radius:0;}
@keyframes hitB{0%{left:0}40%{left:60%}50%{left:55%}100%{left:55%}}
@keyframes hitW{0%,39%{transform:skewX(0);left:70%}40%{transform:skewX(14deg);left:72%}50%,100%{transform:skewX(0);left:70%}}
.anim-pass-over .ball,.anim-fly-over .ball{animation:pover 3s linear infinite;bottom:108px;}
.anim-pass-over .box,.anim-fly-over .box{width:58px;height:28px;bottom:28px;left:50%;transform:translateX(-50%);}
@keyframes pover{0%{left:-8%}100%{left:108%}}
.anim-look-around .ball{bottom:28px;left:50%;transform:translateX(-50%);animation:laround 3s ease-in-out infinite;}
.anim-look-around .box{display:none;}
@keyframes laround{0%,100%{left:50%}25%{left:28%}75%{left:70%}}
.anim-turn-around .ball{bottom:28px;left:50%;transform:translateX(-50%);}
.anim-turn-around .box{display:none;}
.anim-go-up .ball{animation:goup 3s steps(4,end) infinite;}
.anim-go-up .box{width:28px;height:18px;bottom:28px;left:28%;box-shadow:28px -18px 0 #555,56px -36px 0 #555;border-radius:0;}
@keyframes goup{0%{left:8%;bottom:28px}100%{left:90%;bottom:82px}}
.anim-stand-up .ball{left:50%;animation:stdup 2.2s ease-in-out infinite;transform-origin:bottom center;}
.anim-stand-up .box{width:96px;height:9px;bottom:28px;left:50%;transform:translateX(-50%);}
@keyframes stdup{0%,20%{bottom:37px;transform:translateX(-50%) scale(1.5,.3)}55%,85%{bottom:37px;transform:translateX(-50%) scale(.9,1.1)}100%{bottom:37px;transform:translateX(-50%) scale(1.5,.3)}}
.anim-grow-up .ball{left:50%;bottom:28px;animation:gup 3s ease-in-out infinite;transform-origin:bottom center;}
.anim-grow-up .box{display:none;}
@keyframes gup{0%,20%{transform:translateX(-50%) scale(.4)}80%,100%{transform:translateX(-50%) scale(1.5)}}
.anim-go-away .ball,.anim-walk-away .ball,.anim-leave .ball{bottom:28px;animation:waway 3.5s linear infinite;}
.anim-go-away .box,.anim-walk-away .box,.anim-leave .box{display:none;}
@keyframes waway{0%{left:38%;opacity:1;transform:scale(1)}100%{left:108%;opacity:0;transform:scale(.4)}}
.anim-rely-on .ball{animation:relyon 3s ease-in-out infinite;transform-origin:bottom right;}
.anim-rely-on .box{width:18px;height:72px;bottom:28px;left:68%;}
@keyframes relyon{0%,100%{left:28%;bottom:28px;transform:rotate(0)}45%,65%{left:52%;bottom:28px;transform:rotate(15deg)}}
.anim-aim-at .ball,.anim-look-at .ball,.anim-point-at .ball{animation:aimat 2.2s cubic-bezier(.8,0,1,1) infinite;}
.anim-aim-at .box,.anim-look-at .box,.anim-point-at .box{width:36px;height:36px;background:transparent;border:4px solid #ff4444;border-radius:50%;bottom:56px;left:68%;}
@keyframes aimat{0%,20%{left:8%;bottom:28px}80%,100%{left:73%;bottom:60px;transform:scale(.5)}}
.anim-choose-between .ball,.anim-distinguish-between .ball{animation:chbtw 4s ease-in-out infinite;}
.anim-choose-between .box,.anim-distinguish-between .box{width:28px;height:9px;bottom:28px;left:18%;box-shadow:130px 0 0 #555;border-radius:0;}
@keyframes chbtw{0%{left:42%;bottom:28px}20%{left:16%;bottom:54px}40%{left:42%;bottom:28px}60%{left:68%;bottom:54px}80%,100%{left:16%;bottom:36px}}
.anim-go-down .ball{left:50%;transform:translateX(-50%);animation:gdown 3s ease-in-out infinite;}
.anim-go-down .box{width:100%;height:18px;bottom:26px;background:#1a56db;opacity:.5;z-index:3;}
@keyframes gdown{0%,20%{bottom:96px;opacity:1}80%,100%{bottom:2px;opacity:0}}
.anim-break-down .ball{display:none;}
.anim-break-down .box{width:56px;height:56px;bottom:28px;left:50%;transform:translateX(-50%);animation:brkd 3s infinite;border-radius:0;}
@keyframes brkd{0%,40%{height:56px;clip-path:polygon(0 0,100% 0,100% 100%,0 100%);background:#555}46%{clip-path:polygon(0 0,38% 40%,100% 0,78% 100%,0 100%);background:#f44}55%,100%{height:9px;clip-path:polygon(0 78%,28% 100%,68% 78%,100% 100%);background:#555;opacity:.5}}
.anim-bump-into .ball{bottom:28px;animation:bmpB 2s infinite;}
.anim-bump-into .box{width:26px;height:26px;background:#22c55e;border-radius:50%;bottom:28px;left:68%;animation:bmpBx 2s infinite;}
@keyframes bmpB{0%,20%{left:8%}50%{left:58%}72%,100%{left:53%}}
@keyframes bmpBx{0%,49%{left:68%}50%{transform:scaleX(.75)}72%,100%{left:73%;transform:scaleX(1)}}
.anim-step-on .ball{left:50%;transform:translateX(-50%);animation:stpB 2.5s infinite;}
.anim-step-on .box{width:58px;height:18px;bottom:28px;left:50%;transform:translateX(-50%);animation:stpBx 2.5s infinite;}
@keyframes stpB{0%,20%{bottom:110px}42%,100%{bottom:32px}}
@keyframes stpBx{0%,39%{height:18px;background:#555}40%,100%{height:5px;background:#f44}}
.anim-sit-down .ball{animation:sitd 3s ease-in-out infinite;}
.anim-sit-down .box{width:36px;height:36px;background:transparent;border-bottom:10px solid #555;border-left:10px solid #555;bottom:28px;left:48%;border-radius:0;}
@keyframes sitd{0%,20%{left:18%;bottom:28px}42%,100%{left:50%;bottom:36px;transform:scaleY(.8)}}
/* 新シェイプ30 */
.anim-bounce .ball{left:50%;animation:bnc 1.4s ease-in infinite;}
.anim-bounce .box{width:130px;height:5px;bottom:28px;left:50%;transform:translateX(-50%);}
@keyframes bnc{0%{bottom:33px;transform:translateX(-50%) scaleY(.7)}10%{transform:translateX(-50%)}35%{bottom:118px;transform:translateX(-50%)}60%{bottom:33px;transform:translateX(-50%) scaleY(.8)}85%{bottom:70px;transform:translateX(-50%)}100%{bottom:33px;transform:translateX(-50%)}}
.anim-spin .dia{display:block;left:46%;bottom:68px;animation:spn 1.2s linear infinite;}
.anim-spin .ball,.anim-spin .box{display:none;}
@keyframes spn{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.anim-float .ball{left:50%;transform:translateX(-50%);animation:flt 2s ease-in-out infinite;}
.anim-float .box{display:none;}
@keyframes flt{0%,100%{bottom:46px}50%{bottom:108px}}
.anim-expand .ring{display:block;animation:exp_ 1.8s ease-out infinite;}
.anim-expand .ball{left:50%;transform:translateX(-50%);bottom:66px;}
.anim-expand .box{display:none;}
@keyframes exp_{0%{width:8px;height:8px;left:47%;bottom:70px;opacity:1}90%,100%{width:118px;height:118px;left:13%;bottom:10px;opacity:0}}
.anim-orbit .star{display:block;left:44%;bottom:62px;}

  {id:'run-irr',w:'run',m:'ran / run',c:'不規則動詞',a:'anim-run-away',en:'I ran into my old boss at the airport.',ja:'→ 空港で元上司とばったり会った。'},
  {id:'write-irr',w:'write',m:'wrote / written',c:'不規則動詞',a:'anim-spin',en:'He wrote the whole script in a weekend.',ja:'→ 彼は週末で台本を全部書き上げた。'},
];

// word lookup by id
var WI = {};
W.forEach(function(w){WI[w.id]=w;});

// ── DECKS ──
var DECKS = [
  {id:'all',name:'全単語',emoji:'📚',desc:W.length+'語 すべて',ids:'all'},
  {id:'preposition',name:'前置詞コア',emoji:'📍',desc:'in / on / at / through / between',ids:['in','on','at','through','between']},
  {id:'over',name:'〜over系',emoji:'🔝',desc:'jump / get / overcome...',ids:['jump-over','get-over','overcome','pass-over','fly-over']},
  {id:'up',name:'〜up系',emoji:'⬆️',desc:'go / stand / grow / look up',ids:['go-up','stand-up','grow-up','look-up','rise']},
  {id:'down',name:'〜down系',emoji:'⬇️',desc:'go / fall / break / sit down',ids:['go-down','fall-down','break-down','sit-down','dive']},
  {id:'away',name:'〜away系',emoji:'🏃',desc:'run / walk / go away...',ids:['run-away','go-away','walk-away','leave','escape','retreat']},
  {id:'through',name:'〜through系',emoji:'🔄',desc:'go / pass / get through',ids:['go-through','pass-through','get-through','through']},
  {id:'in',name:'〜in系',emoji:'📦',desc:'go / put / drop in...',ids:['in','go-in','put-in','drop-in','bump-into','crash-into']},
  {id:'on',name:'〜on系',emoji:'🎯',desc:'get / put / step / rely on',ids:['on','get-on','put-on','step-on','rely-on']},
  {id:'at',name:'〜at系',emoji:'🏁',desc:'arrive / get to / aim at...',ids:['at','arrive-at','get-to','reach','come-to','aim-at','look-at','point-at']},
  {id:'action',name:'アクション動詞',emoji:'⚡',desc:'bounce / spin / chase...',ids:['bounce','spin','float','expand','orbit','zigzag','climb','follow','overtake','throw','roll','scatter','gather','emerge','sink','peek','break-free','cross','block','swing','surround','chase','pull','push','weave','approach','retreat','hit','strike','bump-into','walk-around','look-around','turn-around','travel-around']},
  {id:'irregular',name:'不規則動詞',emoji:'📝',desc:'go/went/gone など20語',ids:['go-irr','come-irr','see-irr','get-irr','give-irr','take-irr','make-irr','know-irr','think-irr','say-irr','tell-irr','find-irr','feel-irr','break-irr','bring-irr','buy-irr','catch-irr','choose-irr','run-irr','write-irr']},
];

// ── STATE ──
var currentWords = [];
var idx = 0, rev = false, ap = false;
var t1, t2;
var cfg = { rate: 1.0, readCount: 2, gender: 'auto' };
var voices = [], selVoice = null;

// ── TTS ──
function clean(t){ return t.replace(/^[★→\s]+/,''); }
function spk(text, times, cb){
  if(!window.speechSynthesis) return cb && cb();
  speechSynthesis.cancel();
  var n = 0;
  function once(){
    var u = new SpeechSynthesisUtterance(clean(text));
    u.lang = 'en-US'; u.rate = cfg.rate;
    if(selVoice) u.voice = selVoice;
    u.onend = function(){
      n++;
      if(n < times){ setTimeout(once, 500); }
      else if(cb){ setTimeout(cb, 200); }
    };
    speechSynthesis.speak(u);
  }
  once();
}
function spkOnce(text){ spk(text, 1, null); }

// voice loading
function loadVoices(){
  voices = (window.speechSynthesis.getVoices()||[]).filter(function(v){ return v.lang && v.lang.startsWith('en'); });
  var sel = document.getElementById('voiceSelect');
  if(!sel) return;
  sel.innerHTML = '<option value="">デフォルト</option>';
  voices.forEach(function(v, i){
    var o = document.createElement('option');
    o.value = i; o.textContent = v.name + ' (' + v.lang + ')';
    sel.appendChild(o);
  });
  applyGender();
}
function applyGender(){
  if(!voices.length) return;
  var female = ['samantha','karen','moira','tessa','allison','ava','zira','victoria','susan','emma','lisa','alice','fiona','kate'];
  var male = ['david','daniel','alex','fred','thomas','james','nathan','tom','mark','george','paul','oliver','aaron','bruce'];
  if(cfg.gender === 'female'){
    selVoice = voices.find(function(v){ return female.some(function(n){ return v.name.toLowerCase().includes(n); }); })
      || voices.find(function(v){ return v.name.toLowerCase().includes('female'); })
      || voices.find(function(v){ return v.lang==='en-US'; }) || voices[0] || null;
  } else if(cfg.gender === 'male'){
    selVoice = voices.find(function(v){ return male.some(function(n){ return v.name.toLowerCase().includes(n); }); })
      || voices.find(function(v){ return v.name.toLowerCase().includes('male'); })
      || voices.find(function(v){ return v.lang==='en-US'; }) || voices[0] || null;
  } else {
    selVoice = voices.find(function(v){ return v.lang==='en-US'; }) || voices[0] || null;
  }
  // sync select UI
  var sel = document.getElementById('voiceSelect');
  if(sel && selVoice){
    var i = voices.indexOf(selVoice);
    if(i>=0) sel.value = i;
  }
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

// ── SETTINGS ──
function openSettings(){ document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings(e){
  if(!e || e.target === document.getElementById('settingsOverlay') || e.target.classList.contains('bm'))
    document.getElementById('settingsOverlay').classList.remove('open');
}
function setSpeed(v){
  cfg.rate = v;
  document.querySelectorAll('#speedBtns .btn-opt').forEach(function(b){ b.classList.toggle('active', parseFloat(b.textContent) === v); });
}
function setReadCount(n){
  cfg.readCount = n;
  document.querySelectorAll('#readBtns .btn-opt').forEach(function(b){ b.classList.toggle('active', parseInt(b.textContent) === n); });
}
function setGender(g){
  cfg.gender = g;
  document.querySelectorAll('#voiceBtns .btn-opt').forEach(function(b){ b.classList.toggle('active', b.textContent.trim() === (g==='auto'?'オート':g==='female'?'女性':'男性')); });
  applyGender();
}
function selectVoice(val){
  if(val === '') { selVoice = null; return; }
  selVoice = voices[parseInt(val)] || null;
}

// ── HOME SCREEN ──
function buildHome(){
  var grid = document.getElementById('deckGrid');
  grid.innerHTML = '';
  DECKS.forEach(function(d){
    var wc = d.ids === 'all' ? W.length : d.ids.length;
    var div = document.createElement('div');
    div.className = 'deck-card' + (d.id==='all'?' featured':'');
    div.innerHTML = '<div class="deck-emoji">'+d.emoji+'</div><div class="deck-name">'+d.name+'</div><div class="deck-count">'+wc+'語 — '+d.desc+'</div>';
    div.onclick = function(){ startDeck(d); };
    grid.appendChild(div);
  });
}
function startDeck(deck){
  if(deck.ids === 'all'){ currentWords = W.slice(); }
  else { currentWords = deck.ids.map(function(id){ return WI[id]; }).filter(Boolean); }
  idx = 0; rev = false; ap = false;
  document.getElementById('deckLabel').textContent = deck.emoji + ' ' + deck.name;
  document.getElementById('home').style.display = 'none';
  document.getElementById('study').style.display = 'flex';
  render();
}
function goHome(){
  stopAuto();
  speechSynthesis && speechSynthesis.cancel();
  document.getElementById('study').style.display = 'none';
  document.getElementById('home').style.display = 'flex';
}

// ── FLASHCARD ──
function $(i){ return document.getElementById(i); }
function render(){
  var d = currentWords[idx];
  if(!d) return;
  $('ac').className = 'ac ' + d.a;
  $('ct').textContent = d.c;
  $('wd').textContent = d.w;
  $('mn').textContent = d.m;
  $('een').textContent = d.en;
  $('eja').textContent = d.ja;
  $('cn').textContent = (idx+1) + ' / ' + currentWords.length;
  rev = false;
  $('mn').classList.add('hid');
  $('ex').classList.remove('vis');
  $('bt').textContent = '意味・例文を表示';
  spkOnce(d.w);
  $('pf').style.transition = 'none';
  $('pf').style.width = '0%';
}
function reveal(){
  rev = true;
  $('mn').classList.remove('hid');
  $('ex').classList.add('vis');
  $('bt').textContent = '隠す';
  spkOnce(currentWords[idx].en);
}
function hide(){
  rev = false;
  $('mn').classList.add('hid');
  $('ex').classList.remove('vis');
  $('bt').textContent = '意味・例文を表示';
}
function toggle(){ if(ap) stopAuto(); rev ? hide() : reveal(); }
function next(){ if(ap) stopAuto(); idx = (idx+1) % currentWords.length; render(); }
function prev(){ if(ap) stopAuto(); idx = (idx-1+currentWords.length) % currentWords.length; render(); }

// ── AUTO PLAY ──
function startAuto(){
  ap = true;
  $('btnAuto').style.display = 'none';
  $('btnStop').style.display = 'block';
  cycle();
}
function stopAuto(){
  ap = false;
  clearTimeout(t1); clearTimeout(t2);
  speechSynthesis && speechSynthesis.cancel();
  $('btnStop').style.display = 'none';
  $('btnAuto').style.display = 'block';
  $('pf').style.transition = 'none';
  $('pf').style.width = '0%';
}
function cycle(){
  if(!ap) return;
  // reset card
  var d = currentWords[idx];
  $('ac').className = 'ac ' + d.a;
  $('ct').textContent = d.c; $('wd').textContent = d.w; $('mn').textContent = d.m;
  $('een').textContent = d.en; $('eja').textContent = d.ja;
  $('cn').textContent = (idx+1) + ' / ' + currentWords.length;
  rev = false; $('mn').classList.add('hid'); $('ex').classList.remove('vis');
  $('bt').textContent = '意味・例文を表示';
  $('pf').style.transition = 'none'; $('pf').style.width = '0%';
  // progress bar
  setTimeout(function(){
    if(!ap) return;
    $('pf').style.transition = 'width 8s linear';
    $('pf').style.width = '100%';
  }, 50);
  // read word N times then wait
  spk(d.w, cfg.readCount, null);
  t1 = setTimeout(function(){
    if(!ap) return;
    rev = true; $('mn').classList.remove('hid'); $('ex').classList.add('vis');
    $('bt').textContent = '隠す';
    // read example N times then next card
    spk(d.en, cfg.readCount, null);
    t2 = setTimeout(function(){
      if(!ap) return;
      idx = (idx+1) % currentWords.length;
      cycle();
    }, 4000);
  }, 4000);
}

// ── SWIPE ──
var sx = 0;
document.addEventListener('DOMContentLoaded', function(){
  var ph = document.querySelector('.phone');
  if(ph){
    ph.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; }, {passive:true});
    ph.addEventListener('touchend', function(e){
      var dx = e.changedTouches[0].clientX - sx;
      if(Math.abs(dx) > 50 && document.getElementById('study').style.display !== 'none'){ dx < 0 ? next() : prev(); }
    });
  }
  buildHome();
});
</script>
